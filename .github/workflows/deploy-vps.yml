name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy through Hostinger API
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_VPS_ID: "1783294"
          HOSTINGER_REPO_URL: https://github.com/${{ github.repository }}
          HOSTINGER_PROJECT_NAME: polar-sinergy
          HOSTINGER_SMOKE_URL: https://hermes.polarsinergy.com
          HOSTINGER_PURGE_ALL: "1"
        run: |
          python3 deploy/hostinger/deploy.py
